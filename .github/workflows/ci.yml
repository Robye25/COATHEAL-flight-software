name: ci

on:
  push:
  pull_request:

jobs:
  onboard-build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install build deps
        run: sudo apt-get update && sudo apt-get install -y cmake g++ pkg-config
      - name: Configure
        run: cmake -S . -B build
      - name: Build
        run: cmake --build build --config Release --parallel
      - name: Test
        run: ctest --test-dir build --output-on-failure

  ground-station-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r ground-station/requirements.txt
      - name: Run tests
        run: python -m unittest discover -s ground-station/tests -p "test_*.py"