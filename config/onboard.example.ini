# COATHEAL onboard example configuration

runtime.tick_hz=1.0
runtime.bench_mode=false
runtime.debug_arm_code=COATHEAL_DEBUG
runtime.use_simulated_pwm=false
runtime.gpio_chip=/dev/gpiochip0

# Rev C manual-first policy. While the ground link is healthy, ARM enables
# operator-directed heater/stepper commands but does not run phase/fatigue
# automation. After an established link is lost for the timeout below, the
# onboard falls back to pressure phase tracking plus the +5 C floor controller.
manual.manual_first=true
manual.link_loss_fallback_enabled=true
manual.link_loss_fallback_s=10.0

# Empty by default for plug-and-play Ethernet: UDP discovery or the first
# command connection from the GUI selects the telemetry return path.
comms.telemetry_host=
comms.static_ground_ip=
comms.static_pi_ip=169.254.10.10
comms.telemetry_port=4000
comms.command_port=5000
comms.reconnect_ms=2000
comms.discovery_enabled=true
comms.discovery_port=4100
comms.discovery_period_ms=2000
comms.rediscover_period_s=30
comms.failover_grace_s=5
comms.priority=100

storage.primary_log_path=logs/onboard_primary.csv
storage.secondary_log_path=logs/onboard_usb_mirror.csv
storage.queue_dir=logs/telemetry-queue
storage.queue_retention_hours=72.0
storage.queue_max_bytes=8589934592

# Rev B.1: floor-only thermal policy. All 6 heated samples must never drop
# below phase.sample_floor_c (+5 C). There is no box heater and no box
# temperature sensor; samples 6 and 7 are pulled but unheated (PT100 only).
phase.sample_floor_c=5.0
phase.uniformity_tolerance_c=2.0

heater.max_sample_temp_c=85.0

sensor.ambient_temp_min_c=-90.0
sensor.ambient_temp_max_c=50.0
sensor.ambient_pressure_min_mbar=5.0
sensor.ambient_pressure_max_mbar=1050.0

# Rev C fallback phase transitions. These thresholds are used only when
# manual.manual_first=false or when link-loss fallback is active.
# ASCENT -> PRE_FLOAT at pre_float_mbar; FLOAT -> DESCENT at
# float_to_descent_mbar; DESCENT -> LANDED at descent_to_landed_mbar.
# All transitions require `debounce_samples` consecutive ticks.
transition.pre_float_mbar=150.0
transition.ascent_to_float_mbar=100.0
transition.float_to_descent_mbar=300.0
transition.descent_to_landed_mbar=800.0
transition.debounce_samples=5

# Legacy autonomous fatigue sequence parameters. In the Rev C manual-first
# flight profile these are not run automatically; operators use PULL_* commands.
# They remain parsed for bench builds with manual.manual_first=false.
fatigue.fatigue_cycles=30
fatigue.fatigue_travel_full_steps=200
fatigue.fatigue_pull_hold_s=2.0
fatigue.soak_hold_s=900.0
fatigue.soak_travel_full_steps=200

# Rev B.1 heater spec: 5 W @ 24 V DC polyimide film heaters, up to 4 active
# simultaneously -> 20 W combined thermal draw ceiling.
power.max_active_heaters=4
power.max_thermal_w=20.0
power.max_system_w=48.23
power.heater_nominal_w=5.0
# BEXUS User Manual §5.2: 150 Wh / team flight allocation. Reserve ~20 Wh for
# Pi 4 + sensors + I/O so heater integration latches off at 130 Wh.
# Set to 0 to disable cumulative-energy enforcement.
power.energy_budget_wh=130.0

pid.kp=0.20
pid.ki=0.02
pid.kd=0.03

# Rev B.1 hardware: 6 sample heaters (5 W each) on 6 of the 8 samples. Heater
# index i drives sample index i (i in 0..5). Samples 6 and 7 are pulled by
# motor 1 but carry no heater — PT100 only. No electronics-box heater, so
# `hardware.electronics_heater_index` is intentionally unset (default sentinel
# SIZE_MAX = "no box heater").
hardware.heater_count=6

# Visual status LEDs (BCM GPIO line numbers). See docs/hardware.md.
hal.status_led_line=17
hal.mode_led_line=27

# Rev B: two stepper channels pull samples downward to induce microcracks.
# Only one motor pulls at a time (MotionLock) and heater duty is zeroed
# while a pull is active (HeaterScheduler interlock). The legacy stepper.*
# keys below are honored as motor-0 fallbacks until the Rev B schema below
# is wired into config.cpp.
stepper.steps_per_rev=200
stepper.microstep=4
stepper.default_step_hz=100.0
stepper.max_step_hz=100.0
stepper.max_position_steps=200000
stepper.step_line=5
stepper.dir_line=6
stepper.enable_line=13
stepper.invert_direction=false
stepper.enable_active_low=true
stepper.enable_on_boot=false

# --- Rev B motion envelope (shared by both motors) ---
# Max pull rate 100 full-steps/s (~=30 rpm), trapezoidal accel/decel at
# 200 full-steps/s^2 (0.5 s ramp 0->100 Hz). One full revolution (200
# full-steps) ~= 1-2 mm of downward pull. Microstepping 4x (800 usteps/rev)
# default; 5x (1000 usteps/rev) also accepted.
pull.max_step_hz=100.0
pull.accel_steps_per_s2=200.0
pull.microstep=4
pull.travel_full_steps=200
pull.hold_s=5.0

# --- Motor 0 (samples 0..3, Pololu 2851 via TMC2240 on SPI1) ---
motor0.driver=tmc2240
motor0.spi_device=/dev/spidev1.0
motor0.cs_line=8
motor0.step_line=5
motor0.dir_line=6
motor0.enable_line=13
motor0.run_current_a_rms=1.5
motor0.hold_current_frac=0.30
motor0.stealth_chop=1
motor0.samples=0,1,2,3

# --- Motor 1 (samples 4..7, Adafruit 1918 via A4988/DRV8825) ---
motor1.driver=a4988
motor1.step_line=19
motor1.dir_line=26
motor1.enable_line=16
motor1.ms0_line=0
motor1.ms1_line=0
motor1.ms2_line=0
motor1.samples=4,5,6,7

# Bend schedule retained for phase-entry motion (set to 0 until calibrated).
bend.ascent_steps=0
bend.ascent_hold_s=0
bend.activation_steps=0
bend.activation_hold_s=0
bend.float_steps=0
bend.float_hold_s=0
bend.descent_steps=0
bend.descent_hold_s=0
