# COATHEAL onboard DEBUG/TESTING profile.
#
# Differences from onboard.example.ini (flight config):
#   - bench_mode=true        -> ARM_DEBUG unlocks SET_HEATER_DUTY, SET_ALL_DUTY,
#                               SET_PID, SET_BENCH_MODE, CLEAR_OVERRIDES.
#   - use_simulated_pwm=true -> no real GPIO is touched. Heaters, stepper, LEDs
#                               all run against the simulated HAL backends, so
#                               the Pi can run this config with no experiment
#                               hardware attached.
#   - tick_hz=2.0            -> faster control/telemetry loop for debugging.
#   - energy_budget_wh=0     -> cumulative-energy latch disabled (no nuisance
#                               trips during long bench sessions).
#   - stepper.enable_on_boot=true -> stepper is immediately ready for jogging.
#   - comms.discovery_enabled=true + empty static_ground_ip -> the Pi auto-
#                               discovers the GS via UDP beacons on the
#                               discovery port instead of hard-coding loopback.
#
# DO NOT use this file for flight. The flight service loads
# config/onboard.example.ini.

runtime.tick_hz=2.0
runtime.bench_mode=true
runtime.debug_arm_code=COATHEAL_DEBUG
runtime.use_simulated_pwm=true
runtime.gpio_chip=/dev/gpiochip0

comms.static_ground_ip=
comms.static_pi_ip=127.0.0.1
comms.telemetry_port=4000
comms.command_port=5000
comms.reconnect_ms=1000
comms.discovery_enabled=true
comms.discovery_port=4100
comms.discovery_period_ms=2000
comms.rediscover_period_s=30
comms.failover_grace_s=5
comms.priority=100

storage.primary_log_path=logs/onboard_debug.csv
storage.secondary_log_path=logs/onboard_debug_mirror.csv
storage.queue_dir=logs/telemetry-queue-debug
storage.queue_retention_hours=24.0
storage.queue_max_bytes=1073741824

phase.sample_floor_c=5.0
phase.uniformity_tolerance_c=2.0

transition.ascent_to_float_mbar=100.0
transition.float_to_descent_mbar=300.0
transition.descent_to_landed_mbar=800.0

heater.max_sample_temp_c=85.0

sensor.ambient_temp_min_c=-90.0
sensor.ambient_temp_max_c=50.0
sensor.ambient_pressure_min_mbar=5.0
sensor.ambient_pressure_max_mbar=1050.0

# Rev B.1: 5 W heaters, up to 4 active -> 20 W thermal ceiling.
power.max_active_heaters=4
power.max_thermal_w=20.0
power.max_system_w=48.23
power.heater_nominal_w=5.0
power.energy_budget_wh=0.0

pid.kp=0.20
pid.ki=0.02
pid.kd=0.03

# Rev B.1: 6 heaters drive samples 0..5 (heater[i] <-> sample[i]); samples 6
# and 7 are pulled but unheated. No electronics-box heater — the default
# SIZE_MAX sentinel for `hardware.electronics_heater_index` is used.
hardware.heater_count=6

hal.status_led_line=17
hal.mode_led_line=27

stepper.steps_per_rev=200
stepper.microstep=4
stepper.default_step_hz=100.0
stepper.max_step_hz=100.0
stepper.max_position_steps=200000
stepper.step_line=5
stepper.dir_line=6
stepper.enable_line=13
stepper.invert_direction=false
stepper.enable_active_low=true
stepper.enable_on_boot=true

pull.max_step_hz=100.0
pull.accel_steps_per_s2=200.0
pull.microstep=4
pull.travel_full_steps=200
pull.hold_s=5.0

motor0.samples=0,1,2,3
motor1.samples=4,5,6,7

bend.ascent_steps=0
bend.ascent_hold_s=0
bend.activation_steps=0
bend.activation_hold_s=0
bend.float_steps=0
bend.float_hold_s=0
bend.descent_steps=0
bend.descent_hold_s=0
