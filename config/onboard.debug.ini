# COATHEAL onboard DEBUG/TESTING profile.
#
# Differences from onboard.example.ini (flight config):
#   - bench_mode=true        -> ARM_DEBUG unlocks bench-only commands.
#   - use_simulated_pwm=true -> no real GPIO is touched. Heaters, stepper, LEDs
#                               all run against the simulated HAL backends, so
#                               the Pi can run this config with no experiment
#                               hardware attached.
#   - use_simulated_sensors=true -> explicit synthetic sensor data.
#   - tick_hz=2.0            -> faster control/telemetry loop for debugging.
#   - energy_budget_wh=0     -> cumulative-energy latch disabled (no nuisance
#                               trips during long bench sessions).
#   - stepper.enable_on_boot=true -> stepper is immediately ready for jogging.
#   - comms.discovery_enabled=true + empty static_ground_ip -> the Pi auto-
#                               discovers the GS via UDP beacons on the
#                               discovery port instead of hard-coding loopback.
#
# DO NOT use this file for flight. The flight service loads
# config/onboard.example.ini.

runtime.tick_hz=2.0
runtime.bench_mode=true
runtime.debug_arm_code=COATHEAL_DEBUG
runtime.use_simulated_pwm=true
runtime.use_simulated_sensors=true
runtime.gpio_chip=/dev/gpiochip0

manual.manual_first=true
manual.link_loss_fallback_enabled=true
manual.link_loss_fallback_s=5.0

comms.static_ground_ip=
comms.static_pi_ip=127.0.0.1
comms.telemetry_port=4000
comms.command_port=5000
comms.reconnect_ms=1000
comms.discovery_enabled=true
comms.discovery_port=4100
comms.discovery_period_ms=2000
comms.rediscover_period_s=30
comms.failover_grace_s=5
comms.priority=100

storage.primary_log_path=logs/onboard_debug.csv
storage.secondary_log_path=logs/onboard_debug_mirror.csv
storage.queue_dir=logs/telemetry-queue-debug
storage.queue_retention_hours=24.0
storage.queue_max_bytes=1073741824

phase.sample_floor_c=5.0
phase.uniformity_tolerance_c=2.0

transition.pre_float_mbar=150.0
transition.ascent_to_float_mbar=100.0
transition.float_to_descent_mbar=300.0
transition.descent_to_landed_mbar=800.0
transition.debounce_samples=5

heater.max_sample_temp_c=85.0
heater.target_min_c=0.0
heater.target_max_c=80.0
heater.output_lines=17,18,27,5,6,13
heater.temperature_channels=0,1,2,3,4,5
heater.pwm_frequency_hz=10.0
heater.active_high=true

sensor.ambient_temp_min_c=-90.0
sensor.ambient_temp_max_c=50.0
sensor.ambient_pressure_min_mbar=5.0
sensor.ambient_pressure_max_mbar=1050.0
sensor.dps310_enabled=true
sensor.ads1115_enabled=true
sensor.daq132m_enabled=true
sensor.dps310_auto_discover=true
sensor.ads1115_auto_discover=true
sensor.daq132m_auto_discover=true
sensor.dps310_poll_ms=1000
sensor.ads1115_poll_ms=1000
sensor.daq132m_poll_ms=1000
sensor.stale_after_ms=3000
sensor.sample_temperature_source=daq132m_modbus
sensor.daq132m_device=/dev/ttyUSB0
sensor.daq132m_baud=9600
sensor.daq132m_parity=N
sensor.daq132m_data_bits=8
sensor.daq132m_stop_bits=1
sensor.daq132m_slave_id=1
sensor.daq132m_function_code=3
sensor.daq132m_register_base=0
sensor.daq132m_register_count=8
sensor.daq132m_c_per_count=0.1
sensor.daq132m_c_offset=0.0
sensor.daq132m_enabled_channels=0,1,2,3,4,5,6,7
sensor.rtd_click_enabled=false
sensor.rtd_click_spi_device=/dev/spidev0.0
sensor.rtd_click_cs_line=7
sensor.rtd_click_drdy_line=25
sensor.rtd_click_wires=3
sensor.pressure_source=dps310
sensor.dps310_i2c_addr=0x77
sensor.uv_source=guva_s12sd_ads1115
sensor.ads1115_i2c_addr=0x48
sensor.uv_ads1115_channel=0
sensor.uv_full_scale_v=4.096
sensor.resistance_source=disabled

# Final heater spec: 5 W heaters, up to 4 active -> 20 W thermal ceiling.
power.max_active_heaters=4
power.max_thermal_w=20.0
power.max_system_w=48.23
power.heater_nominal_w=5.0
power.energy_budget_wh=0.0
power.logic_regulator_v=5.0
power.stepper_regulator_v=12.0

pid.kp=0.20
pid.ki=0.02
pid.kd=0.03

# Final BOM: 6 heaters drive samples 0..5 (heater[i] <-> sample[i]); samples 6
# and 7 are pulled but unheated. No electronics-box heater; the default SIZE_MAX
# sentinel for `hardware.electronics_heater_index` is used.
hardware.sample_count=8
hardware.heater_count=6

hal.status_led_enabled=false
hal.mode_led_enabled=false
hal.status_led_line=17
hal.mode_led_line=27

stepper.steps_per_rev=200
stepper.default_step_hz=100.0
stepper.max_position_steps=200000
stepper.enable_on_boot=true

pull.max_step_hz=100.0
pull.accel_steps_per_s2=200.0
pull.microstep=4
pull.travel_full_steps=200
pull.hold_s=5.0

motor0.driver=tmc2240
motor0.gpio_chip=/dev/gpiochip0
motor0.spi_device=/dev/spidev0.0
motor0.cs_line=22
motor0.step_line=19
motor0.dir_line=26
motor0.enable_line=12
motor0.invert_direction=false
motor0.enable_active_low=true
motor0.run_current_a_rms=0.8
motor0.current_range_a_peak=0
motor0.hold_current_frac=0.30
motor0.stealth_chop=true
motor0.spi_speed_hz=1000000
motor0.pulse_high_us=3
motor0.retry_ms=2000
motor0.samples=0,1,2,3

motor1.driver=tmc2240
motor1.gpio_chip=/dev/gpiochip0
motor1.spi_device=/dev/spidev0.0
motor1.cs_line=23
motor1.step_line=16
motor1.dir_line=20
motor1.enable_line=21
motor1.invert_direction=false
motor1.enable_active_low=true
motor1.run_current_a_rms=0.8
motor1.current_range_a_peak=0
motor1.hold_current_frac=0.30
motor1.stealth_chop=true
motor1.spi_speed_hz=1000000
motor1.pulse_high_us=3
motor1.retry_ms=2000
motor1.samples=4,5,6,7
